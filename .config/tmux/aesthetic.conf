# Dark cosmic tmux layer focused on dense pane/window work.
set -g default-terminal "tmux-256color"
set -as terminal-features ",xterm-256color:RGB,tmux-256color:RGB"
set -ga terminal-overrides ",xterm-256color:Tc,tmux-256color:Tc"

set -g mouse off
set -g focus-events on
set -g escape-time 10
set -g history-limit 50000
set -g detach-on-destroy off
setw -g mode-keys vi

bind r source-file ~/.tmux.conf \; display-message "tmux config reloaded"
bind M if -F "#{mouse}" "set -g mouse off; display-message 'tmux mouse: off'" "set -g mouse on; display-message 'tmux mouse: on'"
bind c new-window -c "#{pane_current_path}"
bind '"' split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind | split-window -h -c "#{pane_current_path}"

bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
bind -r H resize-pane -L 5
bind -r J resize-pane -D 3
bind -r K resize-pane -U 3
bind -r L resize-pane -R 5

bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi V send -X select-line
bind -T copy-mode-vi C-v send -X rectangle-toggle
bind -T copy-mode-vi y send -X copy-selection-and-cancel

set -g status on
set -g status-position bottom
set -g status-interval 2
set -g status-justify left
set -g status-style "bg=#090812,fg=#e8e3f4"

set -g pane-border-style "fg=#2a2140"
set -g pane-active-border-style "fg=#c8a7ff,bold"
setw -g pane-border-lines heavy
setw -g pane-border-indicators both
setw -g pane-border-status top
setw -g pane-border-format "#{?pane_active,#[fg=#090812,bg=#c8a7ff,bold] ◆ #I:#P #[fg=#090812,bg=#67e8f9,bold] #{pane_current_command} #[fg=#f5f0ff,bg=#2a2140] #{b:pane_current_path} #[default],#[fg=#52436f,bg=#151122] #I:#P #[fg=#8b6fd8,bg=#151122] #{pane_current_command} #[fg=#52436f,bg=#151122] #{b:pane_current_path} #[default]}"
set -g display-panes-colour "#52436f"
set -g display-panes-active-colour "#67e8f9"
set -g message-style "bg=#2a2140,fg=#f5f0ff"
set -g mode-style "bg=#8b6fd8,fg=#090812,bold"

set -g status-left-length 112
set -g status-right-length 120
set -g status-left "#{?client_prefix,#[fg=#090812]#[bg=#ff5c8a]#[bold] PREFIX #[fg=#ff5c8a]#[bg=#c8a7ff],}#[fg=#090812,bg=#c8a7ff,bold] #S #[fg=#c8a7ff,bg=#67e8f9]#[fg=#090812,bg=#67e8f9,bold] ◆ #I:#P #[fg=#67e8f9,bg=#090812] "
set -g status-right "#[fg=#201832,bg=#090812]#[fg=#e8e3f4,bg=#201832] #(~/.config/tmux/tmux-pane-context #{pane_id}) #[fg=#52436f,bg=#201832]#[fg=#f5f0ff,bg=#52436f,bold] %H:%M "

setw -g window-status-separator ""
setw -g window-status-style default
setw -g window-status-current-style default
setw -g window-status-format "#[fg=#52436f,bg=#090812] #I  #W "
setw -g window-status-current-format "#[fg=#090812,bg=#c8a7ff]#[fg=#090812,bg=#c8a7ff,bold] #I #[fg=#c8a7ff,bg=#2a2140]#[fg=#f5f0ff,bg=#2a2140,bold] #W #[fg=#2a2140,bg=#090812]"

setw -g automatic-rename on
setw -g automatic-rename-format "#{b:pane_current_path}"
